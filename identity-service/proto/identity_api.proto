syntax = "proto3";

package identity.service.v1;

option go_package = "bitbucket.bri.co.id/scm/addons/addons-identity-service/protogen/identity-service";

import "google/api/annotations.proto";
import "identity_payload.proto";

service IdentityService {
  rpc SignUp(SignUpRequest) returns (SignUpResponse) {
    option (google.api.http) = {
      post: "/api/auth/signup"
      body: "*"
    };
  }

  rpc SignIn(SignInRequest) returns (SignInResponse) {
    option (google.api.http) = {
      post: "/api/auth/signin"
      body: "*"
    };
  }

  rpc GetMe(GetMeRequest) returns (GetMeResponse) {
    option (google.api.http) = {
      get: "/api/identity/me"
    };
  }

  rpc ValidateOtp(ValidateOtpRequest) returns (ValidateOtpResponse) {
    option (google.api.http) = {
      post: "/api/auth/validate-otp"
      body: "*"
    };
  }

  rpc UpdatePassword(UpdatePasswordRequest) returns (UpdatePasswordResponse) {
    option (google.api.http) = {
      put: "/api/auth/update-password"
      body: "*"
    };
  }
}
