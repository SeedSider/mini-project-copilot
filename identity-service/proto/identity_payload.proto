syntax = "proto3";

package identity.service.v1;

option go_package = "bitbucket.bri.co.id/scm/addons/addons-identity-service/protogen/identity-service";

// SignUp
message SignUpRequest {
  string username = 1;
  string password = 2;
  string phone    = 3;
}

message SignUpResponse {
  string user_id  = 1;
  string username = 2;
}

// SignIn
message SignInRequest {
  string username = 1;
  string password = 2;
}

message SignInResponse {
  string user_id  = 1;
  string username = 2;
  string token    = 3;
}

// GetMe
message GetMeRequest {}

message GetMeResponse {
  string user_id  = 1;
  string username = 2;
}

// ValidateOTP
message ValidateOtpRequest {
  string username = 1;
}

message ValidateOtpResponse {
  int32 otp = 1;
}

// UpdatePassword
message UpdatePasswordRequest {
  string username    = 1;
  string newPassword = 2;
}

message UpdatePasswordResponse {
  string message = 1;
}

// Error
message ErrorBodyResponse {
  bool error = 1;
  uint32 code = 2;
  string message = 3;
}
