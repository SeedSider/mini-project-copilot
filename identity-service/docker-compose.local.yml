version: "3.8"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: identity
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d identity"]
      interval: 5s
      timeout: 5s
      retries: 10

  identity-service:
    build:
      context: .
      dockerfile: Dockerfile.local
    ports:
      - "3031:3031"
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: identity
      DB_SSLMODE: disable
      DB_TIMEZONE: Asia/Jakarta
      JWT_SECRET: secret
      JWT_DURATION: "24h"
      ENV: DEV
      APP_NAME: identity-service
      PRODUCT_NAME: BRICaMS
      LOGGER_TAG: identity.dev
      LOGGER_OUTPUT: stdout
      LOGGER_LEVEL: debug
      FLUENTBIT_HOST: 0.0.0.0
      FLUENTBIT_PORT: 24223
      PROFILE_SERVICE_URL: http://host.docker.internal:8080
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
    command:
      [
        "grpc-gw-server",
        "--port1",
        "9301",
        "--port2",
        "3031",
        "--grpc-endpoint",
        ":9301",
      ]

volumes:
  pgdata:
