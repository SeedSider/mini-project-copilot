services:
  bff-service:
    build:
      context: .
      dockerfile: Dockerfile.local
    container_name: bff-service
    ports:
      - "3000:3000"
      - "9090:9090"
    environment:
      BFF_GRPC_PORT: "9090"
      BFF_HTTP_PORT: "3000"
      IDENTITY_SERVICE_ADDR: host.docker.internal:9301
      PROFILE_SERVICE_ADDR: host.docker.internal:9302
      SAVING_SERVICE_ADDR: host.docker.internal:9303
      JWT_SECRET: secret
      JWT_DURATION: "24h"
      AZURE_SAS_URL: https://plnsa.blob.core.windows.net/?sv=2025-11-05&ss=bfqt&srt=sco&sp=rwdlacupiytfx&se=2026-04-11T14:56:36Z&st=2026-03-26T06:41:36Z&spr=https&sig=uqbKbqKFLDkoZX%2FxLosVhIardyUGotShuDGtHWv9yjE%3D
      AZURE_CONTAINER: images
      ENV: DEV
      APP_NAME: bff-service
      PRODUCT_NAME: BankEase
      LOGGER_TAG: bff.dev
      LOGGER_OUTPUT: stdout
      LOGGER_LEVEL: debug
    extra_hosts:
      - "host.docker.internal:host-gateway"
