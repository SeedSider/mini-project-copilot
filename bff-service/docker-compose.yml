services:
  bff-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bff-service
    ports:
      - "3000:3000"
      - "9090:9090"
    environment:
      BFF_GRPC_PORT: "9090"
      BFF_HTTP_PORT: "3000"
      IDENTITY_SERVICE_ADDR: host.docker.internal:9301
      PROFILE_SERVICE_ADDR: host.docker.internal:9302
      SAVINGS_SERVICE_ADDR: host.docker.internal:9303
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
