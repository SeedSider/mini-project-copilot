services:
  bff-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bff-service
    command:
      [
        "./server",
        "grpc-gw-server",
      ]
    ports:
      - "3000:3000"
      - "9090:9090"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
