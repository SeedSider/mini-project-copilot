name: Deploy to Server

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Build & Deploy via SSH
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            REPO_DIR="$HOME/mini-project-copilot"

            # Clone if not exists, else pull latest
            if [ ! -d "$REPO_DIR/.git" ]; then
              git clone https://github.com/SeedSider/mini-project-copilot.git "$REPO_DIR"
            else
              cd "$REPO_DIR"
              git pull origin master
            fi

            cd "$REPO_DIR/user-profile-service"

            # Build and restart containers
            docker compose up --build -d

            # Remove dangling images from previous builds
            docker image prune -f
