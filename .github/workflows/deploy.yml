name: Deploy to Server

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Build & Deploy via SSH
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          UPS_DATABASE_URL: ${{ secrets.UPS_DATABASE_URL }}
          UPS_JWT_SECRET: ${{ secrets.UPS_JWT_SECRET }}
          UPS_AZURE_STORAGE_SAS_URL: ${{ secrets.UPS_AZURE_STORAGE_SAS_URL }}
          UPS_AZURE_STORAGE_CONTAINER: ${{ vars.UPS_AZURE_STORAGE_CONTAINER }}
          IS_JWT_SECRET: ${{ secrets.IS_JWT_SECRET }}
          IS_DB_HOST: ${{ vars.IS_DB_HOST }}
          IS_DB_PORT: ${{ vars.IS_DB_PORT }}
          IS_DB_USER: ${{ vars.IS_DB_USER }}
          IS_DB_PASSWORD: ${{ secrets.IS_DB_PASSWORD }}
          IS_DB_NAME: ${{ vars.IS_DB_NAME }}
          BFF_JWT_SECRET: ${{ secrets.BFF_JWT_SECRET }}
          BFF_IDENTITY_SERVICE_ADDR: ${{ vars.BFF_IDENTITY_SERVICE_ADDR }}
          BFF_PROFILE_SERVICE_ADDR: ${{ vars.BFF_PROFILE_SERVICE_ADDR }}
          BFF_SAVING_SERVICE_ADDR: ${{ vars.BFF_SAVING_SERVICE_ADDR }}
          BFF_AZURE_SAS_URL: ${{ secrets.BFF_AZURE_SAS_URL }}
          BFF_AZURE_CONTAINER: ${{ vars.BFF_AZURE_CONTAINER }}
          SS_DB_HOST: ${{ vars.SS_DB_HOST }}
          SS_DB_PORT: ${{ vars.SS_DB_PORT }}
          SS_DB_USER: ${{ vars.SS_DB_USER }}
          SS_DB_PASSWORD: ${{ secrets.SS_DB_PASSWORD }}
          SS_DB_NAME: ${{ vars.SS_DB_NAME }}
          P_JWT_SECRET: ${{ secrets.P_JWT_SECRET }}
          P_DB_HOST: ${{ vars.P_DB_HOST }}
          P_DB_PORT: ${{ vars.P_DB_PORT }}
          P_DB_USER: ${{ vars.P_DB_USER }}
          P_DB_PASSWORD: ${{ secrets.P_DB_PASSWORD }}
          P_DB_NAME: ${{ vars.P_DB_NAME }}
        with:
          host: ${{ vars.REMOTE_HOST }}
          username: ${{ vars.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          timeout: 30m
          envs: UPS_DATABASE_URL,UPS_JWT_SECRET,UPS_AZURE_STORAGE_SAS_URL,UPS_AZURE_STORAGE_CONTAINER,IS_JWT_SECRET,IS_DB_HOST,IS_DB_PORT,IS_DB_USER,IS_DB_PASSWORD,IS_DB_NAME,BFF_JWT_SECRET,BFF_IDENTITY_SERVICE_ADDR,BFF_PROFILE_SERVICE_ADDR,BFF_SAVING_SERVICE_ADDR,BFF_AZURE_SAS_URL,BFF_AZURE_CONTAINER,SS_DB_HOST,SS_DB_PORT,SS_DB_USER,SS_DB_PASSWORD,SS_DB_NAME,P_JWT_SECRET,P_DB_HOST,P_DB_PORT,P_DB_USER,P_DB_PASSWORD,P_DB_NAME,BFF_PAYMENT_SERVICE_ADDR
          script: |
            set -e

            REPO_DIR="$HOME/mini-project-copilot"

            # Clone if not exists, else pull latest
            if [ ! -d "$REPO_DIR/.git" ]; then
              git clone https://github.com/SeedSider/mini-project-copilot.git "$REPO_DIR"
            else
              cd "$REPO_DIR"
              git pull origin master
            fi

            # Write .env for user-profile-service (no leading spaces)
            {
              echo "DATABASE_URL=$UPS_DATABASE_URL"
              echo "PORT=8080"
              echo "JWT_SECRET=$UPS_JWT_SECRET"
              echo "AZURE_STORAGE_SAS_URL=$UPS_AZURE_STORAGE_SAS_URL"
              echo "AZURE_STORAGE_CONTAINER=$UPS_AZURE_STORAGE_CONTAINER"
            } > "$REPO_DIR/user-profile-service/.env"

            # Write .env for identity-service
            {
              echo "JWT_SECRET=$IS_JWT_SECRET"
              echo "JWT_DURATION=24h"
              echo "DB_HOST=$IS_DB_HOST"
              echo "DB_PORT=$IS_DB_PORT"
              echo "DB_USER=$IS_DB_USER"
              echo "DB_PASSWORD=$IS_DB_PASSWORD"
              echo "DB_NAME=$IS_DB_NAME"
              echo "DB_SSLMODE=disable"
              echo "DB_TIMEZONE=Asia/Jakarta"
              echo "DB_MAX_RETRY=3"
              echo "DB_TIMEOUT=300"
              echo "ENV=DEV"
              echo "APP_NAME=identity-service"
              echo "PRODUCT_NAME=BRICaMS"
              echo "LOGGER_TAG=identity.dev"
              echo "LOGGER_OUTPUT=stdout"
              echo "LOGGER_LEVEL=debug"
              echo "FLUENTBIT_HOST=0.0.0.0"
              echo "FLUENTBIT_PORT=24223"
              echo "GRPC_MAX_CALL_SEND_MESSAGE=400000000"
              echo "GRPC_MAX_CALL_RECEIVE_MESSAGE=400000000"
            } > "$REPO_DIR/identity-service/.env"

            # Write .env for bff-service
            {
              echo "IDENTITY_SERVICE_ADDR=$BFF_IDENTITY_SERVICE_ADDR"
              echo "PROFILE_SERVICE_ADDR=$BFF_PROFILE_SERVICE_ADDR"
              echo "SAVING_SERVICE_ADDR=$BFF_SAVING_SERVICE_ADDR"
              echo "PAYMENT_SERVICE_ADDR=$BFF_PAYMENT_SERVICE_ADDR"
              echo "JWT_SECRET=$BFF_JWT_SECRET"
              echo "JWT_DURATION=24h"
              echo "AZURE_SAS_URL=$BFF_AZURE_SAS_URL"
              echo "AZURE_CONTAINER=$BFF_AZURE_CONTAINER"
              echo "ENV=DEV"
              echo "APP_NAME=bff-service"
              echo "PRODUCT_NAME=BankEase"
              echo "LOGGER_OUTPUT=stdout"
              echo "LOGGER_LEVEL=debug"
            } > "$REPO_DIR/bff-service/.env"

            # Write .env for saving-service
            {
              echo "DB_HOST=$SS_DB_HOST"
              echo "DB_PORT=$SS_DB_PORT"
              echo "DB_USER=$SS_DB_USER"
              echo "DB_PASSWORD=$SS_DB_PASSWORD"
              echo "DB_NAME=$SS_DB_NAME"
              echo "DB_SSLMODE=disable"
              echo "DB_TIMEZONE=Asia/Jakarta"
              echo "HTTP_PORT=8081"
              echo "GRPC_PORT=9303"
              echo "ENV=DEV"
              echo "APP_NAME=saving-service"
              echo "PRODUCT_NAME=BRICaMS"
              echo "LOGGER_TAG=saving.dev"
              echo "LOGGER_OUTPUT=stdout"
              echo "LOGGER_LEVEL=debug"
              echo "FLUENTBIT_HOST=0.0.0.0"
              echo "FLUENTBIT_PORT=24223"
            } > "$REPO_DIR/saving-service/.env"

            # Write .env for payment-service
            {
              echo "JWT_SECRET=$P_JWT_SECRET"
              echo "JWT_DURATION=24h"
              echo "DB_HOST=$P_DB_HOST"
              echo "DB_PORT=$P_DB_PORT"
              echo "DB_USER=$P_DB_USER"
              echo "DB_PASSWORD=$P_DB_PASSWORD"
              echo "DB_NAME=$P_DB_NAME"
              echo "DB_SSLMODE=disable"
              echo "DB_TIMEZONE=Asia/Jakarta"
              echo "DB_MAX_RETRY=3"
              echo "DB_TIMEOUT=300"
              echo "ENV=DEV"
              echo "APP_NAME=payment-service"
              echo "PRODUCT_NAME=BRICaMS"
              echo "LOGGER_TAG=payment.dev"
              echo "LOGGER_OUTPUT=stdout"
              echo "LOGGER_LEVEL=debug"
              echo "FLUENTBIT_HOST=0.0.0.0"
              echo "FLUENTBIT_PORT=24223"
              echo "GRPC_MAX_CALL_SEND_MESSAGE=400000000"
              echo "GRPC_MAX_CALL_RECEIVE_MESSAGE=400000000"
            } > "$REPO_DIR/payment-service/.env"

            # Deploy user-profile-service
            cd "$REPO_DIR/user-profile-service"
            docker compose up --build -d --force-recreate --remove-orphans

            # Deploy identity-service
            cd "$REPO_DIR/identity-service"
            docker compose up --build -d --force-recreate --remove-orphans

            # Deploy saving-service
            cd "$REPO_DIR/saving-service"
            docker compose up --build -d --force-recreate --remove-orphans

            # Deploy payment-service
            cd "$REPO_DIR/payment-service"
            docker compose up --build -d --force-recreate --remove-orphans

            # Deploy bff-service
            cd "$REPO_DIR/bff-service"
            docker compose up --build -d --force-recreate --remove-orphans

            # Remove dangling images from previous builds
            docker image prune -f

