syntax = "proto3";

package userprofile;

option go_package = "protogen/user-profile-service";

// ── Profile Messages ──

message CreateProfileRequest {
    string user_id       = 1;
    string bank          = 2;
    string branch        = 3;
    string name          = 4;
    string card_number   = 5;
    string card_provider = 6;
    int64  balance       = 7;
    string currency      = 8;
    string account_type  = 9;
    string image         = 10;
}

message GetProfileByIDRequest {
    string id = 1;
}

message GetProfileByUserIDRequest {
    string user_id = 1;
}

message UpdateProfileRequest {
    string id          = 1;
    string bank        = 2;
    string branch      = 3;
    string name        = 4;
    string card_number = 5;
}

message ProfileResponse {
    string id            = 1;
    string user_id       = 2;
    string bank          = 3;
    string branch        = 4;
    string name          = 5;
    string card_number   = 6;
    string card_provider = 7;
    int64  balance       = 8;
    string currency      = 9;
    string account_type  = 10;
    string image         = 11;
}

// ── Menu Messages ──

message GetAllMenusRequest {}

message GetMenusByAccountTypeRequest {
    string account_type = 1;
}

message MenuItem {
    string id        = 1;
    int32  index     = 2;
    string type      = 3;
    string title     = 4;
    string icon_url  = 5;
    bool   is_active = 6;
}

message MenuListResponse {
    repeated MenuItem menus = 1;
}

// ── Common ──

message StandardResponse {
    int32  code        = 1;
    string description = 2;
}
